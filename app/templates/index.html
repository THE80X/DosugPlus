<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация</title>
    <link href="{{ url_for('static', path='css/index.css') }}" rel="stylesheet">
    <script type="module" src="{{ url_for('static', path='js/index.js') }}"></script>
</head>
<body>

    <!-- Лоадер при проверке сессии -->
    <div id="loader">
        <div class="spinner"></div>
        <p>Проверка сессии...</p>
    </div>

    <!-- Форма авторизации / регистрации -->
    <div id="auth-screen">
        <div class="header">
            <div class="logo">🔑</div>
            <h1>Добро пожаловать</h1>
            <p>Войдите в аккаунт или создайте новый</p>
        </div>

        <div class="tabs" id="tabs">
            <button class="tab-btn active" data-mode="login">Вход</button>
            <button class="tab-btn" data-mode="register">Регистрация</button>
        </div>

        <div class="form-container">
            <form id="auth-form">
                <div class="input-group">
                    <label for="username">Имя пользователя</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" autocomplete="username" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Пароль</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" autocomplete="new-password" required>
                    </div>
                </div>

                <div class="input-group" id="confirm-password-group" style="display: none;">
                    <label for="confirm-password">Подтвердите пароль</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirm-password" autocomplete="new-password">
                    </div>
                </div>

                <div id="error-message" class="error-message"></div>

                <button type="submit" id="submit-btn" class="submit-btn">Войти</button>
            </form>
        </div>
    </div>
</body>
</html>
